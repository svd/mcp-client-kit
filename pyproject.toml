[project]
name = "mcp-client-kit"
version = "0.0.1"
description = "Generate typed Python wrappers for any MCP server (codegen skill + CLI)."
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.27",
    "httpx>=0.28",
]

[project.scripts]
mcp-kit = "mcp_client_kit.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mcp_client_kit"]
