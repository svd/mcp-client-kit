[project]
name = "mcp-client-kit-eval"
version = "0.1.0"
description = "Eval framework for the mcp-client-kit generate-mcp-wrappers skill"
authors = [{name = "Sviatoslav Sviridov", email = "sviridov@gmail.com"}]
requires-python = ">=3.11"
dependencies = []   # mcp-client-kit must be installed separately; see README

[project.optional-dependencies]
dev = ["pytest>=8,<10"]

[project.scripts]
eval-kit = "eval_harness.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["eval_harness"]

[tool.pytest.ini_options]
testpaths = ["tests"]
